services:
  - type: web
    name: electromart-web
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn estoreApp.wsgi:application"
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "electromart-web.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://electromart-web.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: electromart-db
          property: connectionString

databases:
  - name: electromart-db
    databaseName: estore
    plan: free
