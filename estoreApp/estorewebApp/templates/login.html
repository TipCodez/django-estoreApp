{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MyShop</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="signup-container">  <!-- same layout for consistency -->
    <form method="POST" class="signup-card">
        {% csrf_token %}

        <h2>Welcome Back</h2>
        <p class="signup-sub">Login to continue shopping.</p>

        {% if messages %}
            {% for message in messages %}
                <p class="field-error" style="text-align:center;">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <div class="input-box">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your username" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="signup-btn">Login</button>

        <p class="login-text">
            Don't have an account? <a href="{% url 'signup' %}">Register</a>
        </p>

    </form>
</div>

</body>
</html>
