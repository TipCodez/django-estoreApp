<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #f4f4f4; 
            padding: 40px;
        }
        .profile-container {
            width: 500px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        .profile-header {
            text-align: center;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ddd;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label { font-weight: bold; }
        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .cn-btn {
            background: #f1c249ff;
            margin-top: 10px;
             color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;


        }
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background: #0056b3; }
        .cn-btn:hover { background: #ef451aff; }
    </style>
</head>
<body>
    <div class="profile-container">
        <h2 class="profile-header">My Profile</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div style="text-align:center;">
                <img id="previewImg" src="{{ profile.profile_image.url }}" class="profile-img">
            </div>

            <div class="form-group">
                <label>Change Profile Photo</label>
                <input type="file" name="profile_image" accept="image/*" onchange="previewImage(event)">
            </div>

            <div class="form-group">
                 {% if messages %}
            {% for message in messages %}
                <p class="field-error" style="text-align:center;">{{ message }}</p>
            {% endfor %}
        {% endif %}
                <label>First Name</label>
                <input type="text" name="username" value="{{ request.user.username }}">
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name" value="{{ profile.last_name }}">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ request.user.email }}">
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" value="{{ profile.phone }}">
            </div>

            <div class="form-group">
                <label>Address</label>
                <input type="text" name="address" value="{{ profile.address }}">
            </div>


            <button type="submit">Save Changes</button>
            <a href="{% url 'profile' %}"><button class="cn-btn">Cancel</button></a>

        </form>
    </div>

    <script>
        function previewImage(event){
            const img = document.getElementById('previewImg');
            img.src = URL.createObjectURL(event.target.files[0]);
        }
    </script>
</body>
</html>
