{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | ElectroMart</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
{% include "partials/navbar.html" with active_page="signup" %}

<div class="signup-container">
    <div class="signup-card">
        <h2>Create Your Account</h2>
        <p class="signup-sub">Sign up to get started!</p>

        <form method="POST" class="signup-form">
            {% csrf_token %}
            {% if messages %}
                {% for message in messages %}
                    <p class="field-error" style="text-align:center;">{{ message }}</p>
                {% endfor %}
            {% endif %}

            <div class="input-box">
                <label for="username">First Name</label>
                <input type="text" name="username" id="username" placeholder="Enter your first name" required>
            </div>
            <div class="input-box">
                <label for="last_name">Last Name</label>
                <input type="text" name="last_name" id="last_name" placeholder="Enter your last name" required>
            </div>
            <div class="input-box">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="input-box">
                <label for="phone">Phone Number</label>
                <input type="text" name="phone" id="phone" placeholder="Enter your phone number" required>
            </div>
            <div class="input-box">
                <label for="location">City / Location</label>
                <input type="text" name="location" id="location" placeholder="Enter your city or location" required>
            </div>
            <div class="input-box">
                <label for="address">Home Address</label>
                <input type="text" name="address" id="address" placeholder="Enter your home address" required>
            </div>
            <div class="input-box">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Enter your password" required>
            </div>
            <div class="input-box">
                <label for="confirm">Confirm Password</label>
                <input type="password" name="confirm" id="confirm" placeholder="Confirm your password" required>
            </div>

            <button type="submit" class="signup-btn">Sign Up</button>
        </form>

        <p class="login-text">
            Already have an account? <a href="{% url 'login' %}">Login</a>
        </p>
    </div>
</div>

<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
