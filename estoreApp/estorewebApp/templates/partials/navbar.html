<header>
  <div class="container nav-row">
    <a href="{% url 'home' %}" class="logo">ElectroMart</a>
    <nav id="nav" class="nav">
      <a href="{% url 'home' %}" {% if active_page == 'home' %}class="active"{% endif %}><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 3 10v11h6v-7h6v7h6V10l-9-7z"/></svg></span>Home</a>
      <a href="{% url 'shop' %}" {% if active_page == 'shop' %}class="active"{% endif %}><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h-2l-1 2v2h2l2.4 8.2A3 3 0 0 0 11.3 19H19v-2h-7.7a1 1 0 0 1-1-.7L9.9 15H19a2 2 0 0 0 1.9-1.4L23 7H8.2L7 4zm4 17a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm8 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/></svg></span>Shop</a>
      <a href="{% url 'about' %}" {% if active_page == 'about' %}class="active"{% endif %}><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 7h2V5h-2v2zm0 12h2V9h-2v10zM12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/></svg></span>About</a>
      <a href="{% url 'contact' %}" {% if active_page == 'contact' %}class="active"{% endif %}><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 6H3a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2zm0 3-9 5L3 9V8l9 5 9-5v1z"/></svg></span>Contact</a>
      {% if user.is_authenticated %}
        <a href="{% url 'wishlist' %}" {% if active_page == 'wishlist' %}class="active"{% endif %}><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s-7-4.4-9.5-8A5.6 5.6 0 0 1 12 5a5.6 5.6 0 0 1 9.5 8C19 16.6 12 21 12 21z"/></svg></span>Wishlist</a>
        <a href="{% url 'cart' %}" {% if active_page == 'cart' %}class="active"{% endif %}><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h-2l-1 2v2h2l2.4 8.2A3 3 0 0 0 11.3 19H19v-2h-7.7a1 1 0 0 1-1-.7L9.9 15H19a2 2 0 0 0 1.9-1.4L23 7H8.2L7 4zm4 17a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm8 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/></svg></span>Cart</a>
        <a href="{% url 'order_history' %}" {% if active_page == 'orders' %}class="active"{% endif %}><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 3h12l4 4v14H4V3zm11 1.5V8h3.5L15 4.5zM7 12h10v2H7v-2zm0 4h10v2H7v-2z"/></svg></span>Orders</a>
        <a href="{% url 'profile' %}" {% if active_page == 'profile' %}class="active"{% endif %}>
          <span class="nav-avatar">
            <img src="{{ user.profile.profile_image.url }}" alt="{{ user.username }} profile picture">
          </span>
        </a>
        {% if user.is_staff %}
          <a href="{% url 'analytics_dashboard' %}" {% if active_page == 'analytics' %}class="active"{% endif %}><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h16v2H2V4h2v16zm3-2V9h3v9H7zm5 0V5h3v13h-3zm5 0v-7h3v7h-3z"/></svg></span>Analytics</a>
        {% endif %}
      {% else %}
        <a href="{% url 'login' %}" {% if active_page == 'login' %}class="active"{% endif %}><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 3H4v18h6v-2H6V5h4V3zm4.6 4.6L13.2 9l2.6 2.6H9v2h6.8L13.2 16l1.4 1.4L20.4 12l-5.8-5.4z"/></svg></span>Login</a>
        <a href="{% url 'signup' %}" {% if active_page == 'signup' %}class="active"{% endif %}><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 12a4 4 0 1 0-6 0 7 7 0 0 0-5 6v2h16v-2a7 7 0 0 0-5-6zm-4-5a2 2 0 1 1 4 0 2 2 0 0 1-4 0zM19 8V5h-2v3h-3v2h3v3h2v-3h3V8h-3z"/></svg></span>Sign Up</a>
      {% endif %}
    </nav>
    <button class="menu-btn" id="menuBtn" aria-label="Toggle menu">☰</button>
  </div>
</header>
