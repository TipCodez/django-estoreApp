<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElectroMart | Shop</title>
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<header>
<div class="container nav-row">
<a href="{% url 'home' %}" class="logo">ElectroMart</a>
<nav class="nav" id="nav">
<a href="{% url 'home' %}">Home</a>
<a href="{% url 'shop' %}">Shop</a>
<a href="{% url 'about' %}">About</a>
<a href="{% url 'contact' %}">Contact</a>
</nav>
<button class="menu-btn" id="menuBtn">☰</button>
</div>
</header>


<main class="container">
<h1 class="section-title">Shop All Electronics</h1>
<div class="product-grid">
<article class="product-card reveal">
<img src="{% static 'images/pc.jpg' %}" alt="Smartphone">
<h3>Smartphone Z5</h3>
<p class="price">$599.00</p>
<a href="{% url 'product_detail' %}" class="btn btn-view">View</a>
</article>


<article class="product-card reveal">
<img src="{% static 'images/pc.jpg' %}" alt="4K TV">
<h3>4K Ultra HD TV</h3>
<p class="price">$799.00</p>
<a href="{% url 'product_detail' %}" class="btn btn-view">View</a>
</article>


<article class="product-card reveal">
<img src="{% static 'images/speaker2.jpg' %}" alt="Speaker">
<h3>Bluetooth Speaker</h3>
<p class="price">$49.99</p>
<a href="{% url 'product_detail' %}" class="btn btn-view">View</a>
</article>

</div>
</main>


<footer class="footer">
<div class="container">
<p>© 2025 ElectroMart | Your trusted electronics store</p>
</div>
</footer>


<script src="{% static 'js/main.js' %}"></script>

</body>
</html>
